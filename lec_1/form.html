<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- action is url jha form submit krna h 
    method by default get j just remember
    form mei ek button hota h jiska by default type submit hota h  -->
    <form action="https://www.google.com/search" method="GET">
        <input name="q" type="text" placeholder="Enter to search on google">
        <button type="submit">Search</button>
    </form>
     <form action="https://www.bing.com/search" method="GET">
        <input name="q" type="text" placeholder="Enter to search on bing">
        <button type="submit">Search</button>
    </form>
    <form action="#">
        <fieldset>
            <legend>
                User Info
            </legend>
            <input type="text" placeholder="Enter name">
            <input type="text" placeholder="Enter age">
        </fieldset>
        <br>
        <fieldset>
            <legend>Additional info</legend>
            <input type="text" placeholder="Why should we hire u??">
        </fieldset>
    </form>
</body>
</html>
