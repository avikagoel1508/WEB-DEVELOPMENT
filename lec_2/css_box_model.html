<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Document</title>
    <style>
        .div1{
            border-width: 1px;
            border-style: dashed;
            border-color: blue;
            padding: 20px;
            margin: 10px;
        }
        .div2{
            border: 1px;
            border-style: solid;
            border-color: black;
        }
        /* <!-- unviversal selector--> */
        *{
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
   <div class="div1">
    I am div 1
   </div> 
   <div class="div2">
    I am div 2
   </div>
</body>
</html>
