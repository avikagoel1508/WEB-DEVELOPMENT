<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and Ids</title>
    <style>
        /* .(dot) is used for class and # for id */
        .myDiv{
            
            color: brown;
        }
        #boy{
            color: blueviolet;
        }
        div{
            color: bisque;
        }
    </style>
</head>
<body>
    <div class="myDiv div-1">I am a div-1</div>
    <div class="myDiv div-2">I am a div-2</div>
    <div class="human" id="boy">I am a boy</div>
    <div class="human" id="girl">I am a girl</div>
</body>
</html>
