<!DOCTYPE html>
<html lang="en">
<head>
    <title>Portfolio Website</title>
    <style>
        body{
                background-color: #242424;
                margin: 0;
        }
        .container{
            display: flex;
            gap: 50px;
            margin-left: 150px;
            margin-top: 80px;
           
        }
        .leftbox{
            width: 600px;
            height: 1200px;
            background-color: #3B3B3B;
            border-radius: 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            
            
        }
        .fontleft{
            font-size: 30px;
            color: rgb(169, 124, 56);
            font-weight: bold;
            font-family: sans-serif;
            padding: 8px 18px;
            background-color: #242424;
            border-radius:25px;
            margin-bottom: 60px;
        }
        .line{
            height: 4px;
            width: 500px;
            background-color: #615f5f;
             margin-bottom: 40px;
        }
        .contact{
            width: 80%;            /* gives left margin feel */

            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
       .label{
        color: gray;
        font-size: 30px;
        font-family: sans-serif;
        font-weight: bold;
       }
       .value{
        color: rgba(240, 255, 255, 0.578);
        font-size: 25px;
        font-family: sans-serif;
        font-weight: bold;
        margin-bottom: 30px;
       }
       .emoji img{
        width: 70px;
        height: 70px;
        border-radius: 50%;

       }
       .emoji{
        display: flex;
        gap: 20px;
       }
        .rightbox{
             width: 1500px;
            height: 100vh;
            background-color: #3B3B3B;
            border-radius: 5%;
        }
    </style>

</head>
<body>
